<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopPop Terminal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', 'Impact', 'Segoe UI', sans-serif;
            background-color: #e5dec9;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(245, 238, 219, 0.8), rgba(217, 203, 175, 0.9)),
                linear-gradient(45deg, rgba(185, 28, 28, 0.05) 25%, transparent 25%, transparent 75%, rgba(185, 28, 28, 0.05) 75%),
                linear-gradient(45deg, rgba(185, 28, 28, 0.05) 25%, transparent 25%, transparent 75%, rgba(185, 28, 28, 0.05) 75%);
            background-size: 100% 100%, 60px 60px, 60px 60px;
            background-position: 0 0, 0 0, 30px 30px;
            color: #111827;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Plakatstil / Vintage Industrial Poster Theme ── */
        .neumorphic-panel {
            background: #fdfbf7;
            border: 4px solid #111827;
            box-shadow: 
                8px 8px 0px #991b1b,
                14px 14px 0px #111827;
            border-radius: 0px;
            position: relative;
        }

        .neumorphic-button {
            font-family: 'JetBrains Mono', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #991b1b;
            color: #fef3c7;
            border: 3px solid #111827;
            box-shadow: 4px 4px 0px #111827;
            padding: 0.7rem 1.8rem;
            border-radius: 0px;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            position: relative;
            text-shadow: 1px 1px 0px #111827;
        }
        
        .neumorphic-button::after {
            display: none;
        }

        .neumorphic-button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #111827;
            background: #b91c1c;
            color: #ffffff;
        }

        .neumorphic-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #111827;
            background: #7f1d1d;
        }

        .run-btn { 
            background: #15803d; 
            color: #fef3c7; 
        }
        .run-btn:hover { 
            background: #16a34a; 
            color: #ffffff; 
        }
        .run-btn.running { opacity: 0.6; pointer-events: none; }
        
        .clear-btn { 
            background: #111827; 
            color: #fef3c7; 
        }
        .clear-btn:hover { 
            background: #1f2937; 
        }

        /* ── Header ── */
        header {
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 1.5rem 0.5rem 1.5rem;
            z-index: 10;
            background: #fdfbf7;
            border: 4px solid #111827;
            box-shadow: 6px 6px 0px #991b1b, 10px 10px 0px #111827;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #991b1b;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-shadow: 2px 2px 0px #111827;
        }
        .logo::before {
            content: '🎈';
            font-size: 1.8rem;
            filter: drop-shadow(2px 2px 0px #111827);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .shortcut-hint {
            font-size: 0.85rem;
            color: #111827;
            font-weight: 900;
            text-transform: uppercase;
            background: #fde047;
            padding: 0.3rem 0.6rem;
            border: 2px solid #111827;
            box-shadow: 2px 2px 0px #111827;
        }

        select {
            font-family: 'JetBrains Mono', monospace;
            background: #fef3c7;
            color: #111827;
            border: 3px solid #111827;
            box-shadow: 3px 3px 0px #111827;
            padding: 0.5rem 1rem;
            border-radius: 0px;
            outline: none;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.15s;
        }
        select:hover {
            background: #fde047;
        }

        /* ── Main Layout ── */
        .main-container {
            display: flex;
            flex: 1;
            padding: 0.5rem 1.5rem 1.5rem 1.5rem;
            gap: 1.8rem;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .panel-header {
            padding: 0.4rem 0.8rem;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #111827;
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 0.8rem;
            border-bottom: 3px solid #111827;
        }
        
        .tab-btn {
            background: #e5e7eb;
            border: 2px solid #111827;
            color: #111827;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            padding: 0.4rem 1rem;
            border-radius: 0px;
            box-shadow: 2px 2px 0px #111827;
            transition: all 0.15s;
        }
        .tab-btn:hover {
            background: #fde047;
        }
        .tab-btn.active {
            color: #fef3c7;
            background: #991b1b;
            box-shadow: 3px 3px 0px #111827;
        }

        /* ── Inner Panels (Editor, Console) ── */
        .editor-wrap, .console, .flow-view {
            flex: 1;
            display: flex;
            position: relative;
            background: #fffbeb;
            border-radius: 0px;
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.1);
            border: 3px solid #111827;
            overflow: hidden;
            padding: 0.8rem;
        }
        
        #code-editor {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: transparent;
        }
        .ace_editor, .ace_editor * {
            font-family: 'JetBrains Mono', monospace !important;
            background-color: transparent !important;
        }
        .ace_gutter {
            background: #fef3c7 !important;
            border-right: 2px solid #111827 !important;
            color: #991b1b !important;
            font-weight: bold;
        }

        /* ── Console / Flow ── */
        .console, .flow-view {
            padding: 1.2rem;
            font-size: 1rem;
            line-height: 1.6;
            overflow-y: auto;
        }
        .flow-view { display: none; }
        
        .console-output { color: #111827; white-space: pre-wrap; font-weight: 700; }
        .console-error { color: #991b1b; margin-top: 1rem; white-space: pre-wrap; font-weight: 900; background: #fee2e2; padding: 0.5rem; border: 2px solid #991b1b; }
        .console-welcome { color: #991b1b; font-weight: 900; text-transform: uppercase; }
        
        .loading { display: none; color: #15803d; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        
        .terminal-input {
            border-bottom: 3px solid #991b1b !important;
            font-weight: 900;
            font-size: 1.05rem !important;
            padding-bottom: 2px;
            background: #fef08a !important;
        }

        /* ── Status bar ── */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 2rem;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fef3c7;
            background: #111827;
            border-top: 4px solid #991b1b;
            box-shadow: 0 -4px 0px #111827;
            z-index: 10;
        }

        ::-webkit-scrollbar { width: 14px; height: 14px; }
        ::-webkit-scrollbar-track { background: #e5dec9; border: 2px solid #111827; }
        ::-webkit-scrollbar-thumb { 
            background: #991b1b; 
            border: 2px solid #111827; 
            box-shadow: 2px 2px 0px #111827;
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: #b91c1c; 
        }

    </style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
<script src="samples.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>
<script>mermaid.initialize({startOnLoad: false, theme: 'default'});</script>
</head>
<body>
    <header class="neumorphic-panel">
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <img src="favicon.png" alt="PopPop Icon" style="height: 28px; width: 28px; object-fit: contain;">
            <span>root@poppop:~#</span>
        </div>
        <div class="header-actions">
            <select id="sample-select">
                <option value="hello">hello.pop</option>
                <option value="basic">basics.pop</option>
                <option value="pipeline">pipeline.pop</option>
                <option value="check">check.pop</option>
                <option value="map_filter">map_filter.pop</option>
                <option value="reduce">reduce.pop</option>
                <option value="fork">fork.pop</option>
                <option value="customfunc">function.pop</option>
                <option value="interactive">interactive.pop</option>
                <option value="empty">empty.pop</option>
            </select>
            <button class="neumorphic-button clear-btn" id="clear-btn">[ CLEAR ]</button>
            <span class="shortcut-hint">^Enter = Run</span>
            <button class="neumorphic-button run-btn" id="run-btn">[ RUN ]</button>
        </div>
    </header>

    <div class="main-container">
        <div class="panel neumorphic-panel">
            <div class="panel-header">~/editor.pop</div>
            <div class="editor-wrap">
                <div id="code-editor"></div>
            </div>
        </div>

        <div class="panel neumorphic-panel">
            <div class="panel-header">
                <button class="tab-btn active" id="tab-console">stdout</button>
                <button class="tab-btn" id="tab-flow">dataflow_viz</button>
            </div>
            
            <div class="console" id="console-view">
                <div id="loading" class="loading">Executing...</div>
                <div id="output" class="console-output console-welcome">Ready.</div>
                <div id="error" class="console-error" style="display: none;"></div>
            </div>
            
            <div class="flow-view" id="flow-view">
                <div id="flow-content" style="color:#666;">Run code to see the data flow...</div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span>NORMAL</span>
        <span id="line-info">Ln 1, Col 1</span>
    </div>

    <script>

        // ── Ace Editor Initialization ──
        const editor = ace.edit("code-editor");
        editor.setTheme("ace/theme/tomorrow");
        editor.session.setMode("ace/mode/python"); // Close enough for PopPop
        editor.setOptions({
            fontSize: "15px",
            fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace",
            showPrintMargin: false,
            wrap: true
        });

        // Ensure character measurements match after webfont finishes loading
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => {
                editor.resize(true);
                editor.renderer.updateFull();
            });
        }

        // Populate sample select
        const sampleSelect = document.getElementById('sample-select');
        sampleSelect.innerHTML = '';
        for (const [key, val] of Object.entries(SAMPLES)) {
            const option = document.createElement('option');
            option.value = key;
            option.textContent = val.name;
            sampleSelect.appendChild(option);
        }

        sampleSelect.addEventListener('change', (e) => {
            const sample = SAMPLES[e.target.value];
            if (sample) {
                editor.setValue(sample.code, -1);
                editor.resize(true);
                editor.renderer.updateFull();
            }
        });

        if (SAMPLES['hello']) {
            editor.setValue(SAMPLES['hello'].code, -1);
        }

        const lineInfo = document.getElementById('line-info');
        editor.session.selection.on('changeCursor', function() {
            const pos = editor.getCursorPosition();
            lineInfo.textContent = `Ln ${pos.row + 1}, Col ${pos.column + 1}`;
        });

        editor.commands.addCommand({
            name: 'runCode',
            bindKey: {win: 'Ctrl-Enter',  mac: 'Command-Enter'},
            exec: function(editor) {
                document.getElementById('run-btn').click();
            }
        });
        // ── Tabs ──
        const tabConsole = document.getElementById('tab-console');
        const tabFlow = document.getElementById('tab-flow');
        const viewConsole = document.getElementById('console-view');
        const viewFlow = document.getElementById('flow-view');

        tabConsole.onclick = () => {
            tabConsole.classList.add('active'); tabFlow.classList.remove('active');
            viewConsole.style.display = 'block'; viewFlow.style.display = 'none';
        };
        tabFlow.onclick = () => {
            tabFlow.classList.add('active'); tabConsole.classList.remove('active');
            viewFlow.style.display = 'block'; viewConsole.style.display = 'none';
        };

        
        // ── Visualizer Logic (Mermaid) ──
        let nodeIdCounter = 0;
        function getNextId() {
            return 'N' + (nodeIdCounter++);
        }



        function escapeMermaid(text) {
            if (text === undefined || text === null) return "null";
            return String(text).replace(/["']/g, "").replace(/[\n\r]/g, " ");
        }

        function formatLiteral(val) {
            if (Array.isArray(val)) {
                return "[" + val.map(formatLiteral).join(", ") + "]";
            }
            if (val && typeof val === 'object') {
                if (val.type === 'LiteralNode') return formatLiteral(val.value);
                return "{object}";
            }
            return String(val);
        }

        function buildMermaidGraph(ast) {
            nodeIdCounter = 0;
            let graphDef = "graph LR\n";
            let connections = "";
            let nodesHtml = "";

            function traverse(node) {
                if (!node || typeof node !== 'object') {
                    let id = getNextId();
                    nodesHtml += `    ${id}["${escapeMermaid(node)}"]
`;
                    return { id: id, headId: id, tailId: id };
                }

                if (node.type === 'Program') {
                    for (let stmt of node.statements) {
                        traverse(stmt);
                    }
                    return null;
                }
                else if (node.type === 'Pipeline') {
                    let prevResult = null;
                    let headId = null;
                    let tailId = null;

                    for (let i = 0; i < node.nodes.length; i++) {
                        let res = traverse(node.nodes[i]);
                        if (!res) continue;

                        if (i === 0) headId = res.headId;
                        tailId = res.tailId;

                        if (prevResult) {
                            let op = i - 1 < node.ops.length ? node.ops[i - 1] : ">>";
                            connections += `    ${prevResult.tailId} -->|"${escapeMermaid(op)}"| ${res.headId}
`;
                        }
                        prevResult = res;
                    }
                    return { id: headId, headId: headId, tailId: tailId };
                }
                else if (node.type === 'LiteralNode') {
                    let id = getNextId();
                    nodesHtml += `    ${id}["Literal: ${escapeMermaid(formatLiteral(node.value))}"]
`;
                    return { id: id, headId: id, tailId: id };
                }
                else if (node.type === 'VariableNode' || node.type === 'ImplicitVariableNode') {
                    let id = getNextId();
                    let prefix = node.type === 'ImplicitVariableNode' ? '@' : '';
                    nodesHtml += `    ${id}(["Var: ${escapeMermaid(prefix + node.name)}"])
`;
                    return { id: id, headId: id, tailId: id };
                }
                else if (node.type === 'FunctionCallNode') {
                    let id = getNextId();
                    nodesHtml += `    ${id}[["Call: ${escapeMermaid(node.name)}()"]]
`;
                    return { id: id, headId: id, tailId: id };
                }
                else if (node.type === 'ExpressionNode') {
                    let id = getNextId();
                    let left = traverse(node.left);
                    let right = traverse(node.right);
                    nodesHtml += `    ${id}(["Expr: ${escapeMermaid(node.operator)}"])\n`;
                    if (left) connections += `    ${left.tailId} -.-> ${id}\n`;
                    if (right) connections += `    ${right.tailId} -.-> ${id}\n`;
                    return { id: id, headId: id, tailId: id };
                }
                else if (node.type === 'BlockNode') {
                    let id = getNextId();
                    nodesHtml += `    subgraph Block_${id} [Block]
`;
                    let first = null, last = null;
                    if (node.pipelines && node.pipelines.length > 0) {
                        for (let p of node.pipelines) { 
                            let res = traverse(p); 
                            if (!first) first = res;
                            last = res;
                        }
                    }
                    nodesHtml += `    end\n`;
                    let dummyId = getNextId();
                    nodesHtml += `    ${dummyId}(["{ Block }"])\n`;
                    return { id: dummyId, headId: dummyId, tailId: dummyId };
                }
                else if (node.type === 'StreamBlockNode') {
                    let blockId = getNextId();
                    nodesHtml += `    subgraph Stream_${blockId} [${escapeMermaid(node.stream_type)}:]
`;
                    let bRes = traverse(node.block);
                    nodesHtml += `    end
`;
                    
                    let head = blockId;
                    let tail = blockId;
                    
                    if (bRes) {
                        // The entry point into the stream block
                        nodesHtml += `    ${blockId}{{"${escapeMermaid(node.stream_type)}"}}
`;
                        connections += `    ${blockId} ==> ${bRes.headId}
`;
                        head = blockId;
                        tail = bRes.tailId;
                    } else {
                        nodesHtml += `    ${blockId}{{"${escapeMermaid(node.stream_type)}"}}
`;
                    }
                    return { id: blockId, headId: head, tailId: tail };
                }
                else if (node.type === 'CheckBlock') {
                    let checkId = getNextId();
                    nodesHtml += `    ${checkId}{{"check:"}}
`;
                    let endId = getNextId();
                    nodesHtml += `    ${endId}(("end check"))
`;
                    for (let b of node.branches) {
                        let condLabel = "else";
                        if (b.condition) {
                            if (b.condition.type === 'LiteralNode') condLabel = "is " + formatLiteral(b.condition.value);
                            else condLabel = "is ...";
                        }
                        let bRes = traverse(b.block);
                        if (bRes) {
                            connections += `    ${checkId} -.->|"${escapeMermaid(condLabel)}"| ${bRes.headId}
`;
                            connections += `    ${bRes.tailId} -.-> ${endId}
`;
                        }
                    }
                    return { id: checkId, headId: checkId, tailId: endId };
                }
                else {
                    let id = getNextId();
                    nodesHtml += `    ${id}["${escapeMermaid(node.type)}..."]
`;
                    return { id: id, headId: id, tailId: id };
                }
            }

            traverse(ast);
            graphDef += nodesHtml + connections;
            return graphDef;
        }



        async function renderAST(astJson) {
            const flowContent = document.getElementById('flow-content');
            try {
                const ast = JSON.parse(astJson);
                if (ast.error) {
                    flowContent.innerHTML = `<div style="color:red">Parse Error: ${escapeHtml(ast.error)}</div>`;
                    return;
                }
                
                let mermaidCode = buildMermaidGraph(ast);
                console.log(mermaidCode);
                
                flowContent.innerHTML = `<div class="mermaid" id="mermaid-graph"></div>`;
                const graphDiv = document.getElementById('mermaid-graph');
                
                // Clear and render using mermaid
                mermaid.render('mermaid-svg', mermaidCode, function(svgCode) {
                    graphDiv.innerHTML = svgCode;
                });
                
            } catch (e) {
                flowContent.innerHTML = `<div style="color:red">Visualizer Error: ${e.message}</div>`;
            }
        }

        
        // ── Terminal I/O ──
        window.appendTerminalOutput = function(text) {
            const outputEl = document.getElementById('output');
            outputEl.appendChild(document.createTextNode(text));
            outputEl.scrollTop = outputEl.scrollHeight;
        };

        window.waitForTerminalInput = function(promptText) {
            return new Promise((resolve) => {
                const outputEl = document.getElementById('output');
                if (promptText) {
                    window.appendTerminalOutput(promptText);
                }
                
                const inputWrapper = document.createElement('div');
                inputWrapper.style.display = 'flex';
                const inputEl = document.createElement('input');
                inputEl.type = 'text';
                inputEl.className = 'terminal-input';
                inputEl.style.flex = '1';
                inputEl.style.background = 'transparent';
                inputEl.style.border = 'none';
                inputEl.style.color = 'inherit';
                inputEl.style.fontFamily = 'inherit';
                inputEl.style.fontSize = 'inherit';
                inputEl.style.outline = 'none';
                
                inputWrapper.appendChild(inputEl);
                outputEl.appendChild(inputWrapper);
                
                inputEl.focus();
                
                // Keep focus when clicking terminal
                outputEl.onclick = () => inputEl.focus();
                
                inputEl.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const val = inputEl.value;
                        // Replace input with static text
                        outputEl.removeChild(inputWrapper);
                        window.appendTerminalOutput(val + "\n");
                        outputEl.onclick = null;
                        resolve(val);
                    }
                });
            });
        };

        // ── Pyodide Setup ──
        let pyodideReadyPromise;
        let pyodideInstance;

        async function initPyodide() {
            pyodideInstance = await loadPyodide();

                // Better decode logic for utf-8
                const binString = atob(str);
                const bytes = new Uint8Array(binString.length);

                }
                return new TextDecoder().decode(bytes);
